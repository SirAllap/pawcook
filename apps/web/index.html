<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/paw.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fcfaf5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f17" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="PawCook — homemade dog food calculator: nutrition, cooking, safety and supplements grounded in AAFCO, NRC, FEDIAF." />
    <title>PawCook — Real food. For your real dog.</title>

    <script>
      // Anti-FOUC: apply theme before React mounts ---------------
      (function () {
        try {
          var stored = localStorage.getItem('pawcook_theme');
          var theme = stored === 'light' || stored === 'dark' ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var html = document.documentElement;
          html.setAttribute('data-theme', theme);
          html.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <script>
      // SPA 404 redirect decoder (GitHub Pages) -----------------
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
