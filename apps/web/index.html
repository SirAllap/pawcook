<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/paw.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fcfaf5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f17" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="PawCook — followability-first nutrition for home-cooked dog and cat meals. AAFCO / NRC / FEDIAF targets, multi-pet planning, cooking, safety and supplements. Open source, MIT." />
    <title>PawCook — Real food. For your real pet.</title>

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PawCook" />
    <meta property="og:title" content="PawCook — Real food. For your real pet." />
    <meta property="og:description" content="Followability-first nutrition for home-cooked dog and cat meals. AAFCO / NRC / FEDIAF targets, multi-pet planning, open source." />
    <meta property="og:url" content="https://sirallap.github.io/pawcook/" />
    <meta property="og:image" content="https://sirallap.github.io/pawcook/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PawCook — Real food. For your real pet." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PawCook — Real food. For your real pet." />
    <meta name="twitter:description" content="Followability-first nutrition for home-cooked dog and cat meals. Open source, MIT." />
    <meta name="twitter:image" content="https://sirallap.github.io/pawcook/og.png" />
    <meta name="twitter:image:alt" content="PawCook — Real food. For your real pet." />

    <script>
      // Anti-FOUC: apply theme before React mounts ---------------
      (function () {
        try {
          var stored = localStorage.getItem('pawcook_theme');
          var theme = stored === 'light' || stored === 'dark' ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var html = document.documentElement;
          html.setAttribute('data-theme', theme);
          html.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <script>
      // SPA 404 redirect decoder (GitHub Pages) -----------------
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
