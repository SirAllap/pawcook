<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="PawCook — real food, for your real pet.">
  <defs>
    <linearGradient id="paw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glowA" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="-5%" cy="115%" r="55%">
      <stop offset="0%" stop-color="#3c8865" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#3c8865" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3c8865" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ink { fill: #161a23; }
      .muted { fill: #4a5267; }
      .brand-name { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-weight: 900; letter-spacing: -0.01em; }
      .eyebrow { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
      .headline { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; letter-spacing: -0.025em; }
      .subhead { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; letter-spacing: -0.005em; }
      .chip-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; letter-spacing: 0.04em; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fbf9f4"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Brand mark -->
  <g transform="translate(80, 78)">
    <g transform="scale(1.05)">
      <path fill="url(#paw)" d="M32 56c-7 0-13-5-13-11 0-7 6-11 13-11s13 4 13 11c0 6-6 11-13 11Z"/>
      <ellipse cx="14" cy="32" rx="5.5" ry="7" fill="url(#paw)"/>
      <ellipse cx="50" cy="32" rx="5.5" ry="7" fill="url(#paw)"/>
      <ellipse cx="23" cy="18" rx="5" ry="6.5" fill="url(#paw)"/>
      <ellipse cx="41" cy="18" rx="5" ry="6.5" fill="url(#paw)"/>
    </g>
    <text x="86" y="48" class="brand-name ink" font-size="36">PawCook</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="222" class="eyebrow" font-size="18" fill="#b45309">
    Open source · MIT · AAFCO / NRC / FEDIAF
  </text>

  <!-- Headline -->
  <text x="80" y="296" class="headline ink" font-size="80">Real food.</text>
  <text x="80" y="386" class="headline ink" font-size="80">For your real pet.</text>

  <!-- Subhead -->
  <text x="80" y="448" class="subhead muted" font-size="26">
    The followability-first nutrition engine
  </text>
  <text x="80" y="484" class="subhead muted" font-size="26">
    for home-cooked dog &amp; cat meals.
  </text>

  <!-- Bottom chips row -->
  <g transform="translate(80, 540)">
    <!-- chip 1 -->
    <g>
      <rect x="0" y="0" width="186" height="42" rx="21" fill="#ffffff" stroke="#e3dccb"/>
      <text x="93" y="27" class="chip-text" font-size="13" fill="#161a23" text-anchor="middle">HOUSEHOLD-FIRST</text>
    </g>
    <!-- chip 2 -->
    <g transform="translate(202, 0)">
      <rect x="0" y="0" width="156" height="42" rx="21" fill="#ffffff" stroke="#e3dccb"/>
      <text x="78" y="27" class="chip-text" font-size="13" fill="#161a23" text-anchor="middle">8 LANGUAGES</text>
    </g>
    <!-- chip 3 -->
    <g transform="translate(374, 0)">
      <rect x="0" y="0" width="186" height="42" rx="21" fill="#ffffff" stroke="#e3dccb"/>
      <text x="93" y="27" class="chip-text" font-size="13" fill="#161a23" text-anchor="middle">DOG · CAT · MULTI-PET</text>
    </g>
  </g>

  <!-- Repo URL bottom-right -->
  <text x="1120" y="571" class="mono" font-size="20" fill="#4a5267" text-anchor="end">
    github.com/SirAllap/pawcook
  </text>

  <!-- Decorative oversized paw, soft, top-right -->
  <g transform="translate(900, 80) scale(5)" opacity="0.10">
    <path fill="url(#paw)" d="M32 56c-7 0-13-5-13-11 0-7 6-11 13-11s13 4 13 11c0 6-6 11-13 11Z"/>
    <ellipse cx="14" cy="32" rx="5.5" ry="7" fill="url(#paw)"/>
    <ellipse cx="50" cy="32" rx="5.5" ry="7" fill="url(#paw)"/>
    <ellipse cx="23" cy="18" rx="5" ry="6.5" fill="url(#paw)"/>
    <ellipse cx="41" cy="18" rx="5" ry="6.5" fill="url(#paw)"/>
  </g>
</svg>
