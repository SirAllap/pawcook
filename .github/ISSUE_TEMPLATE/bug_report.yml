name: Bug report
description: Something in the app is broken, wrong, or surprising.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more specific you
        can be, the faster we can fix it.

        ⚠️ **If this is a security issue**, please use
        [private security advisories](https://github.com/SirAllap/pawcook/security/advisories/new)
        instead — don't post details here.

        ⚠️ **If you think the engine is computing wrong nutrition values
        for your pet**, please use the "Nutritional concern" template
        instead — it asks for the data we need.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, short description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give us the minimal click path. Screenshots welcome.
      placeholder: |
        1. Go to /pawcook/cooking
        2. Click "Plan veggie bags"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: Chrome 131 on macOS 15.1 / Firefox 132 on Ubuntu 24.04 / etc.
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      description: Open DevTools → Console, copy any red error lines here.
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I searched [existing issues](https://github.com/SirAllap/pawcook/issues) and didn't find a duplicate.
          required: true
        - label: I tried reproducing this in an Incognito / Private window to rule out a stale localStorage state.
          required: false
